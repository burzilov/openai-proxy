# LiteLLM config routing to openai-proxy.
# Mounted in container: ./docs/examples/litellm_config.yaml:/app/config.yaml
#
# See docs/litellm.md

model_list:
  - model_name: codex-gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_base: http://openai-proxy:8080/v1
      api_key: os.environ/PROXY_API_KEY

  - model_name: codex-gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_base: http://openai-proxy:8080/v1
      api_key: os.environ/PROXY_API_KEY

  - model_name: codex-gpt-5.3-codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_base: http://openai-proxy:8080/v1
      api_key: os.environ/PROXY_API_KEY

  - model_name: codex-gpt-5.3-codex-spark
    litellm_params:
      model: openai/gpt-5.3-codex-spark
      api_base: http://openai-proxy:8080/v1
      api_key: os.environ/PROXY_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # drop_params strips unsupported top-level fields. Custom tools are carried
  # inside tools[]; openai-proxy dual-wires them as type=function for LiteLLM.
  drop_params: true
  set_verbose: false
